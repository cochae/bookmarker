name: Java CI with Maven
on:
  push:
    branches:
      - "**"

jobs:
  build-bookmark-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bookmarker-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw verify

      - name: Build and Push Image
        if: github.ref == 'refs/heads/main'
        run: |
          ./mvnw clean package -DskipTests
          docker login \
            -u ${{ secrets.DOCKER_USERNAME }} \
            -p ${{ secrets.DOCKER_PASSWORD }}
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t ${{ secrets.DOCKER_USERNAME }}/bookmarker-api:latest .

  build-bookmarker-ui:
    name: Build bookmarker-ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bookmark-ui-nextjs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: npm ci

      - name: Create .env 파일 생성
        run: |
          echo "SERVER_SIDE_API_BASE_URL=${{ secrets.SERVER_SIDE_API_BASE_URL }}" > .env.local
          echo "NEXT_PUBLIC_CLIENT_SIDE_API_BASE=${{ secrets.NEXT_PUBLIC_CLIENT_SIDE_API_BASE }}" >> .env.local

      - name: Next.js Build
        run: npm run build

      - name: Build and Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker login \
            -u ${{ secrets.DOCKER_USERNAME }} \
            -p ${{ secrets.DOCKER_PASSWORD }}
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -f Dockerfile.ui \
            -t ${{ secrets.DOCKER_USERNAME }}/bookmark-ui-nextjs:latest .

  ################
  # k8s 배포 job
  # github action에서 build => docker hub 완료된 후에 server에 요청해서 변경된 사항dmf k8s가 kubectl 명령어를 통해서 새로 고침(rollout)
  #
  # 1) Github Actions에서 server의 SSH로 접속(계정/비밀번호-secrets)
  # 2) kubectl 설정 파일 지정
  # 3) 리소스 읽어와야함 확인 deployment가 있는 pods 이름이 맞는지 확인
  # 4) 기존의 Pod를 종료 -> 새로운 Pod를 생성
  # 5) 상태확인 Pod가 정상 상태 될때 까지 대기
  ##
  deploy:
    name: Deploy to Server k8s
    runs-on: ubuntu-latest

    needs:
      - build-bookmark-api
      - build-bookmarker-ui

    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v0.1.7

        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}

          script: |
            export KUBECONFIG=/home/ubuntu/.kube/config
            kubectl get nodes
            kubectl get pods
            kubectl apply -f /k8s

            echo "==== Deployment 재시작 ===="

            kubectl rollout restart deployment/bookmarker-api
            kubectl rollout restart deployment/bookmarker-ui-deployment

            echo "==== 새로운 Pod 실행 대기 ===="
            kubectl rollout status deployment/bookmarker-api
            kubectl rollout status deployment/bookmarker-ui-deployment

            echo "==== k8s 배포 완료 ===="
