name: Java and Node.js CI/CD Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  #######################################################
  #         bookmarker-api (Spring Boot) 빌드 및 배포     #
  #######################################################
  build-bookmark-api:
    name: Build and Push bookmarker-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bookmarker-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # 1. 모든 브랜치에서 공통으로 테스트 및 검증 진행
      - name: Verify and Test with Maven
        run: |
          chmod +x mvnw
          ./mvnw verify

      # 2. 오직 main 브랜치일 때만 Docker Hub로 푸시 (Jib 최적화 활용)
      - name: Build and Push Docker Image via Jib
        if: github.ref == 'refs/heads/main'
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          ./mvnw clean package jib:build \
            -DskipTests \
            -Djib.to.image=${{ secrets.DOCKER_USERNAME }}/bookmarker-api:latest

  #######################################################
  #         bookmarker-ui (Next.js) 빌드 및 배포         #
  #######################################################
  build-bookmarker-ui:
    name: Build and Push bookmarker-ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bookmark-ui-nextjs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm # npm 캐시를 추가하여 빌드 속도를 높입니다.

      - name: Install dependencies
        run: npm ci

      # Next.js 정적 빌드 시점에 환경 변수가 유입되어 코드에 박히도록 설정
      - name: Create .env.local File
        run: |
          echo "SERVER_SIDE_API_BASE_URL=${{ secrets.SERVER_SIDE_API_BASE_URL }}" > .env.local
          echo "NEXT_PUBLIC_CLIENT_SIDE_API_BASE=${{ secrets.NEXT_PUBLIC_CLIENT_SIDE_API_BASE }}" >> .env.local

      # 모든 브랜치에서 Next.js 빌드가 깨지는지 미리 검증
      - name: Next.js Production Build
        run: npm run build

      # 오직 main 브랜치일 때만 Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -f Dockerfile.ui -t ${{ secrets.DOCKER_USERNAME }}/bookmark-ui-nextjs .
          docker push ${{ secrets.DOCKER_USERNAME }}/bookmark-ui-nextjs
