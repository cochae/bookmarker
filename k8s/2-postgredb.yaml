apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-pod

  template:
    metadata:
      labels:
        app: postgres-pod
    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueForm:
                ConfigMapKeyRef:
                  name: bookmarker-config
                  key: postgres_username

            - name: POSTGRES_PASSWORD
              valueForm:
                ConfigMapKeyRef:
                  name: bookmarker-config
                  key: postgres_password

            - name: POSTGRES_DB
              valueForm:
                ConfigMapKeyRef:
                  name: bookmarker-config
                  key: postgres_dbname

            - name: POSTGRES_USER
              valueForm:
                ConfigMapKeyRef:
                  name: bookmarker-config
                  key: postgres_username

# kubectl create deployment postgres-deployment --image=postgres:14-alpine --port=5432 --dry-run=clinet -o yaml > 1-postgredb.yaml
